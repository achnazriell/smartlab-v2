[build]
builder = "nixpacks"
buildCommand = "composer install --no-dev --optimize-autoloader && npm install && npm run build"

[build.environment]
NODE_VERSION = "18"
PHP_VERSION = "8.2"
COMPOSER_VERSION = "2"

[start]
cmd = "php -S 0.0.0.0:${PORT:-8080} -t public"

[deploy]
preDeployCommand = "php artisan config:clear && php artisan key:generate --force"

[[services]]
type = "web"
numReplicas = 1
